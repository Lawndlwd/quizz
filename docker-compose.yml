services:
  app:
    image: ghcr.io/lawndlwd/quizz:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATA_DIR=/data
      # Set these in a .env file next to this compose file. No insecure defaults:
      # the app refuses to start without a strong JWT_SECRET, and seeds a random
      # admin password (printed once in the logs) if ADMIN_PASSWORD is unset.
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in .env (openssl rand -hex 32)}
    volumes:
      - ./data:/data
      - ./avatars:/data/avatars

  caddy:
    image: caddy:latest
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./site:/srv
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
