name: Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/lawndlwd/quizz

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        runner:
          - os: ubuntu-24.04
            platform: linux/amd64
            suffix: amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.runner.platform }}
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}-${{ matrix.runner.suffix }}
          cache-from: type=gha,scope=quizz-${{ matrix.runner.suffix }}
          cache-to: type=gha,mode=max,scope=quizz-${{ matrix.runner.suffix }}

  merge:
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:latest \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            ${{ env.IMAGE }}:${{ github.sha }}-amd64 \
            ${{ env.IMAGE }}:${{ github.sha }}-arm64
